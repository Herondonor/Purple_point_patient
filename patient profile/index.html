<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Patient</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <form action="add_patient.php" method="POST">
    <input name="first_name" placeholder="First name" required>
    <input name="middle_name" placeholder="Middle name">
    <input name="last_name"  placeholder="Last name"  required>
    <input name="date_of_birth" type="date" placeholder="Date of Birth" required>
    <select name="sex" required>
      <option value="">Select Sex</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>
    <input name="contact_number" placeholder="Contact Number">
    <input name="email"      type="email" placeholder="Email">
    <input name="complete_address" placeholder="Complete Address">
    <input name="city_municipality" placeholder="City/Municipality">
    <input name="zip_code" placeholder="Zip Code">
    <button type="submit">Save Patient</button>
  </form>

</body>
</html>
